entries:
  TREESEED_PROJECT_DOMAINS:
    label: Project custom domains
    group: auth
    description: Comma-separated domains for the web-facing project surfaces. Treeseed uses this as a shared hint when it needs to complete environment-specific URL defaults.
    howToGet: List one or more custom domains, separated by commas. Leave the default if the primary site URL already reflects the right domain.
    sensitivity: plain
    targets:
      - github-variable
      - railway-var
      - cloudflare-var
    scopes:
      - staging
      - prod
    storage: shared
    requirement: optional
    purposes:
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: projectDomainsDefault
    relevanceRef: webSurfaceEnabled
  TREESEED_FORM_TOKEN_SECRET:
    label: Forms token secret
    group: forms
    cluster: forms-core
    startupProfile: core
    description: Signs form-related tokens and protects Treeseed forms workflows in local and hosted runtimes.
    howToGet: Treeseed can generate a strong random secret for you. Reuse it across environments only if that matches your security model.
    sensitivity: secret
    targets:
      - local-runtime
      - local-cloudflare
      - github-secret
      - cloudflare-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: required
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    defaultValueRef: generatedSecret
    localDefaultValueRef: generatedSecret
    relevanceRef: formsEnabled
  TREESEED_PUBLIC_TURNSTILE_SITE_KEY:
    label: Turnstile site key
    group: forms
    cluster: turnstile
    description: Public site key used by the browser to render the Turnstile challenge when forms protection is enabled.
    howToGet: Create a Turnstile widget in Cloudflare Turnstile and copy the site key.
    sensitivity: plain
    targets:
      - github-variable
      - cloudflare-var
    scopes:
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: turnstileEnabled
    requiredWhenRef: turnstileNonLocal
  TREESEED_TURNSTILE_SECRET_KEY:
    label: Turnstile secret key
    group: forms
    cluster: turnstile
    description: Server-side Turnstile secret used to verify challenge responses.
    howToGet: Create a Turnstile widget in Cloudflare Turnstile and copy the secret key.
    sensitivity: secret
    targets:
      - github-secret
      - cloudflare-secret
    scopes:
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: turnstileEnabled
    requiredWhenRef: turnstileNonLocal
  TREESEED_SMTP_HOST:
    label: SMTP host
    group: smtp
    cluster: smtp
    description: SMTP host for Treeseed email delivery when SMTP-backed forms behavior is enabled.
    howToGet: Use the SMTP hostname from your email provider or local Mailpit instance.
    sensitivity: plain
    targets:
      - local-runtime
      - local-cloudflare
      - github-variable
      - cloudflare-var
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    localDefaultValueRef: localSmtpHostDefault
    relevanceRef: smtpEnabled
    requiredWhenRef: smtpNonLocal
  TREESEED_SMTP_PORT:
    label: SMTP port
    group: smtp
    cluster: smtp
    description: Port used to connect to the SMTP server.
    howToGet: Use the port provided by your email service, commonly 587, 465, or the Mailpit local port.
    sensitivity: plain
    targets:
      - local-runtime
      - local-cloudflare
      - github-variable
      - cloudflare-var
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: number
    sourcePriority:
      - machine-config
      - process-env
    localDefaultValueRef: localSmtpPortDefault
    relevanceRef: smtpEnabled
    requiredWhenRef: smtpNonLocal
  TREESEED_SMTP_USERNAME:
    label: SMTP username
    group: smtp
    cluster: smtp
    description: SMTP identity used when authenticating to the mail provider.
    howToGet: Use the SMTP username or mailbox identity from your email provider.
    sensitivity: plain
    targets:
      - local-runtime
      - local-cloudflare
      - github-variable
      - cloudflare-var
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: smtpEnabled
    requiredWhenRef: smtpNonLocal
  TREESEED_SMTP_PASSWORD:
    label: SMTP password
    group: smtp
    cluster: smtp
    description: SMTP password or app password used for authenticated email sending.
    howToGet: Use the SMTP password or app-specific password from your email provider.
    sensitivity: secret
    targets:
      - local-runtime
      - local-cloudflare
      - github-secret
      - cloudflare-secret
      - railway-secret
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: nonempty
    sourcePriority:
      - machine-config
      - process-env
    relevanceRef: smtpEnabled
    requiredWhenRef: smtpNonLocal
  TREESEED_SMTP_FROM:
    label: SMTP from address
    group: smtp
    cluster: smtp
    description: Email address Treeseed uses as the sender for mail notifications.
    howToGet: Use a verified sender address from your SMTP provider.
    sensitivity: plain
    targets:
      - local-runtime
      - local-cloudflare
      - github-variable
      - cloudflare-var
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: email
    sourcePriority:
      - machine-config
      - process-env
    localDefaultValueRef: contactEmailDefault
    relevanceRef: smtpEnabled
    requiredWhenRef: smtpNonLocal
  TREESEED_SMTP_REPLY_TO:
    label: SMTP reply-to address
    group: smtp
    cluster: smtp
    description: Reply-to address attached to Treeseed-generated emails.
    howToGet: Use a monitored mailbox that should receive replies from end users.
    sensitivity: plain
    targets:
      - local-runtime
      - local-cloudflare
      - github-variable
      - cloudflare-var
      - railway-var
    scopes:
      - local
      - staging
      - prod
    storage: shared
    requirement: conditional
    purposes:
      - dev
      - save
      - deploy
      - config
    validation:
      kind: email
    sourcePriority:
      - machine-config
      - process-env
    localDefaultValueRef: contactEmailDefault
    relevanceRef: smtpEnabled
    requiredWhenRef: smtpNonLocal

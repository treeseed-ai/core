name: Publish @treeseed/core

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    environment:
      name: Production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Assert node:sqlite availability
        run: node -e "import('node:sqlite').then(() => console.log('node:sqlite available')).catch((error) => { console.error(error); process.exit(1); })"

      - name: Install dependencies
        run: |
          node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync('package.json', 'utf8')); if (p.scripts) delete p.scripts.prepare; fs.writeFileSync('package.json', JSON.stringify(p, null, '\t') + '\n');"
          for attempt in 1 2 3; do
            if npm ci; then
              git checkout -- package.json
              exit 0
            fi
            echo "npm ci failed; retrying (${attempt}/3)."
            sleep $((attempt * 5))
          done
          npm ci
          git checkout -- package.json

      - name: Validate release tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release:check-tag -- "${GITHUB_REF_NAME}"

      - name: Verify package
        run: npm run verify

      - name: Publish package
        run: npm run release:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: '@treeseed/core'
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${PACKAGE_NAME} ${GITHUB_REF_NAME}" \
            --generate-notes

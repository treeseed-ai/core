id: "@treeseed/core"
name: TreeSeed Core
kind: node-typescript
type: node-library
repository: treeseed-ai/core
publishTarget: npm
workflowTemplateVersion: "1"
githubEnvironments:
  - production
requiredSecrets:
  - NPM_TOKEN
verify:
  fast: npm run verify
  local: npm run verify:local
  release: npm run release:verify
artifacts:
  - provider: npm
    name: "@treeseed/core"
releaseGate:
  workflow: publish.yml
